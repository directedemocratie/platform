name: Sync Legislation

on:
  schedule:
    # S'exécute tous les dimanches à 3h00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch: # Permet de lancer la mise à jour manuellement depuis GitHub si besoin

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run legislation sync script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run db:sync-laws
